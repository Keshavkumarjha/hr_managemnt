services:
  docs:
    image: hr_managemnt_local_docs
    container_name: hr_managemnt_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./hr_managemnt:/app/hr_managemnt:z
    ports:
      - '9000:9000'
    command: /start-docs
